services:
  data-service:
    build:
      context: .
      dockerfile: services/data-service/Dockerfile
    ports:
      - "8000:8000"

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATA_SERVICE_URL: http://data-service:8000/metrics
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - data-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - ai-service

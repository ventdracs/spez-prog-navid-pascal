apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ai-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SERVICE_URL
              value: http://data-service:8000
          ports:
            - containerPort: 8001

